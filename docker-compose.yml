services:
  evas-api:
    image: ${CLI_PROXY_IMAGE:-ikiwi/evas-api:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: evas-api
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/evas-api/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.evas-api
      - ${CLI_PROXY_LOG_PATH:-./logs}:/evas-api/logs
    restart: unless-stopped
